# nginx Security & HTTP/2 Configuration — tmpmailio.com
# Incluir este archivo dentro del bloque server{} de la config principal:
#   include /etc/nginx/conf.d/tmpmailio-security.conf;

# ── HTTP/2 ──────────────────────────────────────────────────────────────────
# Cambiar en el bloque server principal:
#   listen 443 ssl http2;
# (Si se usa Cloudflare como proxy, HTTP/2 se negocia entre cliente y Cloudflare
# automáticamente. HTTP/2 entre Cloudflare y el origen es opcional pero recomendado.)

# ── Security Headers ─────────────────────────────────────────────────────────

# HSTS — fuerza HTTPS durante 1 año, incluye subdominios
# IMPORTANTE: Solo activar después de confirmar que HTTPS funciona correctamente.
# Para añadir a la lista de preload de navegadores: https://hstspreload.org
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Evitar que la página se cargue en iframes (clickjacking)
add_header X-Frame-Options "DENY" always;

# Evitar MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Controlar información de referer enviada a otros sitios
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Restringir acceso a APIs del navegador
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# CSP en modo Report-Only (no bloquea nada, solo reporta)
# PASO 1: Activar en modo Report-Only y revisar la consola del navegador durante 2 semanas.
# PASO 2: Cuando no haya errores, cambiar a Content-Security-Policy (enforced).
# PASO 3: Después de 2-4 semanas sin errores, enviar a https://hstspreload.org
#
# Ajustar los dominios según los servicios reales utilizados:
# - api.tmpmailio.com: API/WebSocket
# - fonts.gstatic.com / fonts.googleapis.com: Google Fonts
# - Eliminar 'unsafe-inline' una vez migradas las inline styles a clases CSS
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://api.tmpmailio.com https://api.tmpmailio.com; img-src 'self' data: https:; frame-ancestors 'none';" always;

# ── Ocultar información del servidor ─────────────────────────────────────────
server_tokens off;

# Para ocultar X-Powered-By de Next.js, añadir en next.config.js:
# headers: async () => [{ source: '/(.*)', headers: [{ key: 'X-Powered-By', value: '' }] }]
# O simplemente: poweredByHeader: false  ← añadir en nextConfig object

# ── Verificación ─────────────────────────────────────────────────────────────
# curl -I https://tmpmailio.com/es | grep -iE "strict-transport|x-frame|x-content-type|referrer|permissions"
# Esperado: todos los headers presentes en la respuesta
#
# Para score A+ en https://securityheaders.com, después de mover CSP a enforced.
